<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALEM.SYS — Aksil Alem</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;700&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* VARIABLES CSS : Centralisation des couleurs pour faciliter les changements.
           Le vert #39FF14 donne cet aspect "vieux moniteur" ultra-moderne.
        */
        :root {
            --green:   #39FF14;
            --bg:      #060608;
            --bg1:     #0d0d10;
            --border:  rgba(57,255,20,0.12);
            --text:    #c8cfd8;
            --mono:    'IBM Plex Mono', monospace;
            --sidebar: 260px;
        }

        /* RESET de base pour enlever les marges par défaut des navigateurs */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--mono);
            background: var(--bg);
            color: var(--text);
            cursor: none; /* Cache le curseur standard pour afficher le custom cursor */
            overflow-x: hidden;
        }

        /* ── CUSTOM CURSOR ── 
           L'anneau et le point central qui suivent la souris via JavaScript.
        */
        #cursor {
            position: fixed; width: 10px; height: 10px; background: var(--green);
            border-radius: 50%; pointer-events: none; z-index: 99999;
            transform: translate(-50%, -50%);
        }
        #cursor-ring {
            position: fixed; width: 30px; height: 30px;
            border: 1px solid rgba(57,255,20,0.4); border-radius: 50%;
            pointer-events: none; z-index: 99998; transform: translate(-50%, -50%);
            transition: transform 0.15s ease-out; /* Effet de retard pour la fluidité */
        }

        /* ── EFFET DE LIGNES DE BALAYAGE (SCANLINES) ── 
           Crée les petites lignes horizontales typiques des écrans CRT.
        */
        body::before {
            content: ''; position: fixed; inset: 0;
            background: repeating-linear-gradient(0deg, transparent 0px, transparent 3px, rgba(0,0,0,0.2) 3px, rgba(0,0,0,0.2) 4px);
            pointer-events: none; z-index: 9000; opacity: 0.3;
        }

        /* ── EFFET DE GRAIN (NOISE) ── 
           Un léger bruit visuel animé pour éviter d'avoir des noirs trop "plats".
        */
        body::after {
            content: ''; position: fixed; inset: -50%; width: 200%; height: 200%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.02; pointer-events: none; z-index: 8999; animation: grain 0.8s steps(1) infinite;
        }
        @keyframes grain {
            0%, 100% { transform:translate(0,0) }
            10% { transform:translate(-2%,-1%) }
        }

        /* ── SIDEBAR ── 
           Fixée à gauche, elle contient la navigation et les informations d'identité.
        */
        .sidebar {
            position: fixed; top: 0; left: 0; width: var(--sidebar); height: 100vh;
            background: var(--bg1); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; z-index: 500;
        }

        /* Animation de la ligne verticale lumineuse sur le bord de la sidebar */
        .sidebar::after {
            content: ''; position: absolute; top: 0; right: 0; width: 1px; height: 100%;
            background: linear-gradient(180deg, transparent, var(--green), transparent);
            animation: sideline 4s infinite;
        }
        @keyframes sideline { 0%,100%{opacity:0.2} 50%{opacity:0.6} }

        /* Style des liens de navigation */
        .nav-item {
            display: flex; align-items: center; gap: 10px; padding: 12px 24px;
            color: #6b7280; text-decoration: none; font-size: 0.75rem;
            transition: 0.2s; border-left: 2px solid transparent;
        }
        .nav-item:hover, .nav-item.active {
            color: var(--green); background: rgba(57,255,20,0.04);
            border-left-color: var(--green);
        }

        /* ── MAIN CONTENT ── */
        .main { margin-left: var(--sidebar); flex: 1; }

        /* ── HERO SECTION ── */
        #home {
            min-height: 100vh; display: flex; flex-direction: column;
            justify-content: center; padding: 80px;
        }

        /* Effet Glitch sur le nom */
        .hero-name {
            font-size: clamp(3rem, 8vw, 6rem); font-weight: 700; color: #fff;
            position: relative; display: inline-block; letter-spacing: -2px;
        }
        /* Les pseudo-éléments créent des copies du texte pour les décaler lors du glitch */
        .hero-name::before, .hero-name::after {
            content: attr(data-text); position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; opacity: 0.8;
        }
        .hero-name::before {
            color: var(--green); transform: translateX(-2px);
            clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%); /* Coupe le haut du texte */
            animation: glitch 3s infinite linear alternate-reverse;
        }
        @keyframes glitch {
            0%, 80% { opacity: 0; }
            85% { opacity: 1; transform: translate(-4px, 2px); }
            90% { opacity: 0; }
        }

        /* Boutons avec effet néon au survol */
        .hero-btn.primary {
            background: var(--green); color: #000; padding: 12px 24px;
            text-decoration: none; font-weight: 700; font-size: 0.8rem;
            transition: 0.3s;
        }
        .hero-btn.primary:hover {
            background: #fff; box-shadow: 0 0 20px var(--green);
        }

        /* Responsive : Mobile */
        @media (max-width: 900px) {
            .sidebar { transform: translateX(-100%); } /* Cache la sidebar sur mobile */
            .main { margin-left: 0; }
        }
    </style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>

<aside class="sidebar" id="sidebar">
    <div style="padding: 30px; border-bottom: 1px solid var(--border);">
        <div style="font-size: 0.6rem; color: var(--green); opacity: 0.7;">SYS_ID // 2026</div>
        <div style="font-size: 1.1rem; font-weight: 700; color: #fff;">Aksil ALEM</div>
        <div style="font-size: 0.7rem; color: #6b7280;">Étudiant en Informatique</div>
    </div>

    <nav style="padding: 20px 0;">
        <a href="#home" class="nav-item active"><span>▸</span> ACCUEIL</a>
        <a href="#about" class="nav-item"><span>◈</span> À PROPOS</a>
        <a href="#projects" class="nav-item"><span>◇</span> PROJETS</a>
        <a href="#contact" class="nav-item"><span>◇</span> CONTACT</a>
    </nav>

    <div style="margin-top: auto; padding: 20px; border-top: 1px solid var(--border);">
        <div id="clock" style="color: var(--green); font-size: 0.8rem; letter-spacing: 2px;">00:00:00</div>
        <div id="dateStr" style="font-size: 0.6rem; color: #6b7280;">--/--/----</div>
    </div>
</aside>

<main class="main">
    <section id="home">
        <div style="display: flex; gap: 8px; margin-bottom: 20px;">
            <div style="width: 10px; height: 10px; border-radius: 50%; background: #ff5f57;"></div>
            <div style="width: 10px; height: 10px; border-radius: 50%; background: #ffbd2e;"></div>
            <div style="width: 10px; height: 10px; border-radius: 50%; background: #27c93f;"></div>
        </div>

        <div style="color: var(--green); font-size: 0.8rem; opacity: 0.7;">~/portfolio $ whoami</div>
        <h1 class="hero-name" data-text="Aksil ALEM">Aksil ALEM</h1>
        
        <div style="margin: 20px 0 40px; color: #6b7280; font-size: 0.9rem; letter-spacing: 3px;">
            <span style="color: var(--green);">CYBERSÉCURITÉ</span> // RÉSEAUX // DÉVELOPPEMENT
        </div>

        <div style="display: flex; gap: 15px;">
            <a href="URL_VERS_TON_CV" class="hero-btn primary" target="_blank" rel="noopener">↓ TÉLÉCHARGER CV</a>
            <a href="#projects" style="color: #fff; text-decoration: none; font-size: 0.8rem; align-self: center;">Projets →</a>
        </div>
    </section>

    <section id="about" style="padding: 80px; border-top: 1px solid var(--border);">
        <h2 style="color: #fff; font-size: 2rem;">À propos</h2>
        </section>
</main>

<script>
    /**
     * SÉCURITÉ ET INTERACTION
     */

    // 1. Gestion du curseur personnalisé
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursor-ring');

    document.addEventListener('mousemove', (e) => {
        // Met à jour la position des div sur les coordonnées X et Y de la souris
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
        
        // L'anneau suit avec un léger retard via CSS transition
        ring.style.left = e.clientX + 'px';
        ring.style.top = e.clientY + 'px';
    });

    // 2. Gestion de l'horloge système
    function updateClock() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        
        document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
        
        const options = { year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('dateStr').textContent = now.toLocaleDateString('fr-FR', options);
    }
    setInterval(updateClock, 1000); // Mise à jour chaque seconde
    updateClock();

    // 3. Protection simple contre le vol d'images ou clic droit (Optionnel pour le style "Hack")
    document.addEventListener('contextmenu', event => {
        // event.preventDefault(); // Décommente si tu veux bloquer le clic droit
    });
</script>

</body>
</html>
