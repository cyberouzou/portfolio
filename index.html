<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALEM.SYS — Aksil Alem</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /* ============================================================
           VARIABLES ET RESET
           ============================================================ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --green: #39FF14; --bg: #060608; --bg1: #0d0d10;
            --border: rgba(57,255,20,0.12); --text: #c8cfd8;
            --text2: #6b7280; --mono: 'IBM Plex Mono', monospace;
            --sidebar: 260px;
        }

        body {
            font-family: var(--mono);
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            cursor: none; /* Désactive le curseur par défaut pour le curseur custom */
        }

        /* ── CURSEUR PERSONNALISÉ ── 
           Utilise pointer-events: none pour que le curseur ne bloque pas les clics réels.
        */
        #cursor, #cursor-ring {
            position: fixed;
            pointer-events: none;
            z-index: 99999;
            transform: translate(-50%, -50%);
            border-radius: 50%;
        }
        #cursor { width: 10px; height: 10px; background: var(--green); transition: transform 0.06s; }
        #cursor-ring { width: 30px; height: 30px; border: 1px solid rgba(57,255,20,0.4); transition: transform 0.18s ease; }

        /* ── EFFETS VISUELS (SCANLINES & GRAIN) ── 
           Utilisation de pseudo-éléments pour superposer des textures sans charger d'images lourdes.
        */
        body::before {
            content: ''; position: fixed; inset: 0;
            background: repeating-linear-gradient(0deg, transparent 0px, transparent 3px, rgba(0,0,0,0.25) 3px, rgba(0,0,0,0.25) 4px);
            pointer-events: none; z-index: 9000; opacity: 0.3;
        }

        /* ============================================================
           LAYOUT (SIDEBAR + MAIN)
           ============================================================ */
        .layout { display: flex; min-height: 100vh; }

        .sidebar {
            position: fixed; top: 0; left: 0; width: var(--sidebar); height: 100vh;
            background: var(--bg1); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; z-index: 500;
        }

        .main { margin-left: var(--sidebar); flex: 1; padding: 40px; }

        /* ── ANIMATION PULSE DU STATUS ── */
        .status-dot {
            width: 6px; height: 6px; border-radius: 50%; background: var(--green);
            box-shadow: 0 0 8px var(--green); animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.5} }

        /* ── EFFET GLITCH DU NOM ── */
        .hero-name {
            font-size: clamp(3rem, 9vw, 7rem); font-weight: 700; color: #fff;
            position: relative; display: inline-block;
        }
        .hero-name::before, .hero-name::after {
            content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }
        .hero-name::before { color: var(--green); animation: glitch 3s infinite; clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%); transform: translateX(-2px); }

        @keyframes glitch {
            0%, 90% { opacity: 0; } 92% { opacity: 1; transform: translateX(-5px); } 95% { opacity: 0; }
        }

        /* Responsive Mobile */
        @media (max-width: 900px) {
            .sidebar { transform: translateX(-100%); }
            .main { margin-left: 0; }
        }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div id="cursor-ring"></div>

    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div style="padding: 30px;">
                <div style="color: var(--green); font-size: 0.6rem; letter-spacing: 3px;">SYS_ID // 2026</div>
                <h1 style="color:white; font-size: 1.2rem;">Aksil ALEM</h1>
                <p id="role-text" data-i18n="hero_role" style="font-size: 0.7rem; color: var(--text2);">Étudiant en Informatique</p>
            </div>

            <nav style="flex: 1; padding: 20px;">
                <div class="status-dot"></div> <span style="font-size: 0.6rem;" data-i18n="status">Disponible — BTS SIO</span>
            </nav>

            <div style="padding: 20px; border-top: 1px solid var(--border);">
                <div id="clock" style="color: var(--green); font-size: 0.8rem;">00:00:00</div>
                <button id="langToggle" style="background:none; border:1px solid var(--border); color:white; cursor:none; padding:5px; width:100%; margin-top:10px;">EN</button>
            </div>
        </aside>

        <main class="main">
            <section id="home">
                <div style="color: var(--green); font-size: 0.8rem; margin-bottom: 10px;">~/portfolio $ whoami</div>
                <h1 class="hero-name" data-text="Aksil ALEM">Aksil ALEM</h1>
                <p data-i18n="hero_subtitle" style="margin-top: 20px; letter-spacing: 2px;">CYBERSÉCURITÉ // RÉSEAUX</p>
            </section>
        </main>
    </div>

    <script>
        /**
         * GESTION DU CURSEUR PERSONNALISÉ
         * Suit les mouvements de la souris avec un léger décalage pour l'anneau (smooth effect).
         */
        const cursor = document.getElementById('cursor');
        const ring = document.getElementById('cursor-ring');

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            ring.style.left = e.clientX + 'px';
            ring.style.top = e.clientY + 'px';
        });

        /**
         * GESTION DE L'HORLOGE
         */
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('fr-FR');
        }
        setInterval(updateClock, 1000);
        updateClock();

        /**
         * SYSTÈME DE TRADUCTION SÉCURISÉ (i18n)
         * Utilise textContent pour prévenir les injections XSS.
         */
        const translations = {
            fr: {
                hero_role: "Étudiant en Informatique",
                status: "Disponible — BTS SIO",
                hero_subtitle: "CYBERSÉCURITÉ // RÉSEAUX"
            },
            en: {
                hero_role: "IT Student",
                status: "Available — BTS SIO",
                hero_subtitle: "CYBERSECURITY // NETWORKING"
            }
        };

        let currentLang = 'fr';
        const langBtn = document.getElementById('langToggle');

        langBtn.addEventListener('click', () => {
            currentLang = currentLang === 'fr' ? 'en' : 'fr';
            langBtn.textContent = currentLang === 'fr' ? 'EN' : 'FR';
            
            // Parcours tous les éléments ayant l'attribut data-i18n
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                // SÉCURITÉ : textContent assure que le texte est traité comme du texte pur, pas du HTML
                el.textContent = translations[currentLang][key];
            });
        });
    </script>
</body>
</html>
